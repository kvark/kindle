name: CI
on:
  push:
    branches: ["main", "claude/*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (lavapipe)
            os: ubuntu-latest
          - name: macOS (Metal)
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install lavapipe and Vulkan
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan-dev

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check

      - name: Check (cnn feature)
        run: cargo check --features cnn

      - name: Clippy
        run: cargo clippy --features cnn -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Reward signal tests
        run: cargo test --test reward_signal

      - name: Opt parity tests
        run: cargo test --test opt_parity
        continue-on-error: true

      - name: Canary tests
        run: cargo test --test canaries
        continue-on-error: true
