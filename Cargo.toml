[package]
name = "iris"
version = "0.1.0"
authors = ["Dzmitry Malyshau"]
repository = "https://github.com/kvark/iris"
edition = "2024"
rust-version = "1.88"
description = "Continually self-training RL agent on Meganeura"
license = "MIT"

[dependencies]
meganeura = { git = "https://github.com/kvark/meganeura" }
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hashbrown = "0.15"
log = "0.4"
env_logger = "0.11"

[[example]]
name = "grid_world"
path = "examples/grid_world.rs"
