[package]
name = "kindle-py"
version = "0.2.0"
authors = ["Dzmitry Malyshau"]
repository = "https://github.com/kvark/kindle"
edition = "2024"
rust-version = "1.88"
description = "Python bindings for the kindle RL agent (built via maturin)."
license = "MIT"
publish = false

[lib]
name = "kindle"
crate-type = ["cdylib", "rlib"]

[dependencies]
kindle = { path = "../kindle", version = "0.2" }
pyo3 = { version = "0.22", features = ["extension-module"] }
rand = "0.9"
